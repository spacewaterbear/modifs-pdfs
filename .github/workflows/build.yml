name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: modifs-pdfs-linux
          - os: windows-latest
            artifact: modifs-pdfs-windows
          - os: macos-latest
            artifact: modifs-pdfs-macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build
        working-directory: code
        run: uv run pyinstaller modifs_pdfs.spec

      - name: Zip (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: zip -r ${{ matrix.artifact }}.zip code/dist/

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path code/dist/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact }}.zip
